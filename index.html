<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Résidence Harmonie — Accueil</title>
  <meta name="description" content="Résidence Harmonie management system — select your role to continue.">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap">

  <style>
    :root {
      --rh-sidebar-bg:     #1a2e38;
      --rh-sidebar-active: #e8770d;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--rh-sidebar-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rh-login-card {
      background: #ffffff;
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    }

    .rh-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }

    .rh-brand-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--rh-sidebar-active);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rh-brand-name {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--rh-sidebar-bg);
      line-height: 1.2;
    }

    .rh-brand-sub {
      font-size: 0.7rem;
      color: #6b7280;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .role-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      padding: 1rem 1.25rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 0.875rem;
      background: #f9fafb;
      cursor: pointer;
      text-align: left;
      transition: all 0.18s;
      font-family: inherit;
      text-decoration: none;
      color: inherit;
      margin-bottom: 0.75rem;
    }

    .role-btn:hover {
      border-color: var(--rh-sidebar-active);
      background: #fff7ee;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(232,119,13,0.15);
    }

    .role-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .role-icon.manager  { background: #eff6ff; color: #3b82f6; }
    .role-icon.employee { background: #f0fdf4; color: #12b76a; }
    .role-icon.admin    { background: #faf5ff; color: #a855f7; }

    .role-title { font-size: 0.9rem; font-weight: 700; color: #111827; display: block; }
    .role-sub   { font-size: 0.72rem; color: #6b7280; display: block; }

    .role-arrow { margin-left: auto; color: #9ca3af; font-size: 0.8rem; }

    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 1.5rem 0 1.25rem;
    }

    .rh-footer-note {
      text-align: center;
      font-size: 0.7rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>

  <div class="rh-login-card">

    <!-- Brand -->
    <div class="rh-brand">
      <div class="rh-brand-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
      </div>
      <div>
        <div class="rh-brand-name">Résidence Harmonie</div>
        <div class="rh-brand-sub">Management System</div>
      </div>
    </div>

    <h1 style="font-size:1rem;font-weight:700;color:#111827;margin-bottom:0.25rem">Welcome back</h1>
    <p style="font-size:0.8rem;color:#6b7280;margin-bottom:1.5rem">Select your role to continue</p>

    <!-- Role cards -->
    <a href="manager.html" class="role-btn">
      <span class="role-icon manager"><i class="fas fa-chart-line"></i></span>
      <span>
        <span class="role-title">Manager</span>
        <span class="role-sub">Dashboard, reports, oversight</span>
      </span>
      <span class="role-arrow"><i class="fas fa-chevron-right"></i></span>
    </a>

    <a href="employee.html" class="role-btn">
      <span class="role-icon employee"><i class="fas fa-tasks"></i></span>
      <span>
        <span class="role-title">Employee</span>
        <span class="role-sub">Daily task execution</span>
      </span>
      <span class="role-arrow"><i class="fas fa-chevron-right"></i></span>
    </a>

    <a href="admin.html" class="role-btn">
      <span class="role-icon admin"><i class="fas fa-cog"></i></span>
      <span>
        <span class="role-title">Administrator</span>
        <span class="role-sub">System configuration &amp; settings</span>
      </span>
      <span class="role-arrow"><i class="fas fa-chevron-right"></i></span>
    </a>

    <hr class="divider">
    <p class="rh-footer-note">&copy; 2026 Résidence Harmonie &mdash; v1.0.0</p>

  </div>

</body>
</html>
